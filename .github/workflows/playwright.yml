name: "playwright"
permissions:
  contents: read
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  playwright-linux:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: install deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: install playwright browsers
        run: deno run -A npm:playwright@1.58 install --with-deps chromium firefox

      - name: run playwright tests
        run: |
          cd packages/canvist
          deno test --allow-all tests/playwright/
        env:
          CI: "true"
          CI_BROWSERS: "chromium firefox"

  playwright-webkit:
    timeout-minutes: 30
    runs-on: macos-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: cache rust
        uses: Swatinem/rust-cache@v2

      - name: install wasm-pack
        run: cargo install wasm-pack --locked

      - name: install deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: build wasm
        run: wasm-pack build crates/canvist_wasm --target web --out-dir ../../packages/canvist/wasm

      - name: install playwright webkit
        run: deno run -A npm:playwright@1.58 install --with-deps webkit

      - name: run playwright tests
        run: |
          cd packages/canvist
          deno test --allow-all tests/playwright/
        env:
          CI: "true"
          CI_BROWSERS: "webkit"
