name: "release"

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Must start with `v` and have a matching GitHub release."
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.event.release.tag_name }}
  cancel-in-progress: true

jobs:
  publish:
    env:
      RELEASE_TAG: ${{ inputs.tag || github.event.release.tag_name }}
    permissions:
      contents: write
    if: >-
      github.repository_owner == 'ifiokjr' &&
      startsWith(inputs.tag || github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: publish to crates.io
        run: cargo publish --workspace
        shell: devenv shell -c -- bash -e {0}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
