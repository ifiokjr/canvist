<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>canvist editor demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
        min-height: 100vh;
      }

      h1 {
        margin-bottom: 1rem;
        color: #333;
      }

      .editor-container {
        position: relative;
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }

      #editor-canvas {
        display: block;
        cursor: text;
      }

      #contenteditable-editor {
        width: 800px;
        min-height: 400px;
        padding: 20px;
        font-family: sans-serif;
        font-size: 16px;
        line-height: 1.5;
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        outline: none;
        white-space: pre-wrap;
      }

      .controls {
        margin: 1rem 0;
        display: flex;
        gap: 1rem;
      }

      button {
        padding: 0.5rem 1rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: white;
        cursor: pointer;
      }

      button:hover {
        background: #eee;
      }

      .info {
        margin-top: 1rem;
        color: #666;
        font-size: 0.9rem;
      }

      #text-output {
        margin-top: 1rem;
        padding: 1rem;
        background: #f0f0f0;
        border-radius: 4px;
        font-family: monospace;
        white-space: pre-wrap;
        max-width: 800px;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <h1>canvist editor</h1>

    <div class="controls">
      <button id="btn-canvas" class="active">Canvas Editor</button>
      <button id="btn-contenteditable">contenteditable (comparison)</button>
    </div>

    <div id="canvas-section">
      <div id="formatting-toolbar" style="margin-bottom:8px;display:flex;gap:4px;">
        <button id="btn-bold" title="Bold (Ctrl+B)" style="font-weight:bold;width:32px;">B</button>
        <button id="btn-italic" title="Italic (Ctrl+I)" style="font-style:italic;width:32px;">I</button>
        <button id="btn-underline" title="Underline (Ctrl+U)" style="text-decoration:underline;width:32px;">U</button>
      </div>
      <div class="editor-container">
        <canvas id="editor-canvas" width="800" height="400"></canvas>
      </div>
    </div>

    <div id="ce-section" style="display: none">
      <div
        id="contenteditable-editor"
        contenteditable="true"
        data-placeholder="Type here..."
      >
      </div>
    </div>

    <div class="info">
      <span id="char-count">Characters: 0</span>
    </div>
    <pre id="text-output"></pre>

    <script type="module">
      import init, { CanvistEditor } from "../wasm/canvist_wasm.js";

      let editor = null;
      let cursorOffset = 0;
      let selectionAnchor = null;
      let selectionFocus = null;
      let isDraggingSelection = false;
      let didDragSelection = false;

      async function setup() {
        await init();
        editor = CanvistEditor.create("editor-canvas");
        editor.render();

        // --- Caret blink timer ---
        let caretVisible = true;
        setInterval(() => {
          caretVisible = !caretVisible;
          editor.set_caret_visible(caretVisible);
          try {
            editor.render();
          } catch {}
        }, 530);

        // --- Hidden textarea for keyboard capture ---
        const canvas = document.getElementById("editor-canvas");
        const textarea = document.createElement("textarea");
        textarea.id = "canvist-input";
        textarea.setAttribute("autocomplete", "off");
        textarea.setAttribute("autocorrect", "off");
        textarea.setAttribute("autocapitalize", "off");
        textarea.setAttribute("spellcheck", "false");
        textarea.setAttribute("aria-label", "Document editor input");
        textarea.style.cssText =
          "position:absolute;left:0;top:0;width:1px;height:1px;opacity:0.01;pointer-events:none;";
        canvas.parentElement.appendChild(textarea);

        canvas.addEventListener("click", () => textarea.focus());
        canvas.addEventListener("focus", () => textarea.focus());
        canvas.setAttribute("tabindex", "0");
        canvas.setAttribute("role", "textbox");
        canvas.setAttribute("aria-multiline", "true");
        canvas.setAttribute("aria-label", "Canvist document editor");
        canvas.setAttribute("aria-controls", "canvist-input");

        function hasSelection() {
          return (
            selectionAnchor !== null &&
            selectionFocus !== null &&
            selectionAnchor !== selectionFocus
          );
        }

        function normalizedSelection() {
          if (!hasSelection()) {
            return null;
          }
          const start = Math.min(selectionAnchor, selectionFocus);
          const end = Math.max(selectionAnchor, selectionFocus);
          return { start, end };
        }

        function clearSelection() {
          selectionAnchor = cursorOffset;
          selectionFocus = cursorOffset;
          editor.set_selection(cursorOffset, cursorOffset);
        }

        function setSelection(anchor, focus) {
          selectionAnchor = anchor;
          selectionFocus = focus;
          cursorOffset = focus;
          editor.set_selection(anchor, focus);
        }

        function deleteSelectionIfNeeded() {
          const selection = normalizedSelection();
          if (!selection) {
            return false;
          }
          editor.delete_range(selection.start, selection.end);
          cursorOffset = selection.start;
          clearSelection();
          return true;
        }

        function insertTextAtSelection(text) {
          deleteSelectionIfNeeded();
          editor.insert_text_at(cursorOffset, text);
          cursorOffset += text.length;
          clearSelection();
        }

        function charOffsetFromMouse(e) {
          const rect = canvas.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          try {
            return editor.hit_test(x, y);
          } catch {
            return cursorOffset;
          }
        }

        function syncA11yState() {
          const text = editor.plain_text();
          const selection = normalizedSelection();
          textarea.value = text;
          if (selection) {
            textarea.setSelectionRange(selection.start, selection.end);
          } else {
            textarea.setSelectionRange(cursorOffset, cursorOffset);
          }
          canvas.setAttribute("aria-valuetext", text);
        }

        function renderFrame() {
          try {
            caretVisible = true;
            editor.set_caret_visible(true);
            editor.set_now_ms(Date.now());
            editor.render();
            syncA11yState();
          } catch (e) {
            console.error("render error:", e);
          }
        }

        let clickCount = 0;
        let lastClickTime = 0;

        canvas.addEventListener("mousedown", (e) => {
          const now = Date.now();
          clickCount = now - lastClickTime < 400 ? clickCount + 1 : 1;
          lastClickTime = now;

          const offset = charOffsetFromMouse(e);
          textarea.focus();

          if (clickCount === 3) {
            // Triple-click: select entire line/paragraph.
            const text = editor.plain_text();
            let start = offset;
            while (start > 0 && text[start - 1] !== "\n") start--;
            let end = offset;
            while (end < text.length && text[end] !== "\n") end++;
            setSelection(start, end);
            clickCount = 0;
          } else if (clickCount === 2) {
            // Double-click: select word.
            editor.select_word_at(offset);
            selectionAnchor = editor.selection_start();
            selectionFocus = editor.selection_end();
            cursorOffset = selectionFocus;
          } else {
            isDraggingSelection = true;
            didDragSelection = false;
            setSelection(offset, offset);
          }

          renderFrame();
          e.preventDefault();
        });

        canvas.addEventListener("mousemove", (e) => {
          if (!isDraggingSelection) return;
          const offset = charOffsetFromMouse(e);
          if (offset !== cursorOffset) {
            didDragSelection = true;
          }
          setSelection(selectionAnchor, offset);
          renderFrame();
        });

        window.addEventListener("mouseup", (e) => {
          if (!isDraggingSelection) return;
          isDraggingSelection = false;
          const offset = charOffsetFromMouse(e);
          setSelection(selectionAnchor, offset);
          renderFrame();
        });

        canvas.addEventListener("click", (e) => {
          textarea.focus();
          if (didDragSelection) {
            didDragSelection = false;
            return;
          }
          const offset = charOffsetFromMouse(e);
          cursorOffset = offset;
          clearSelection();
          renderFrame();
        });

        // --- Formatting toolbar ---
        function updateToolbarState() {
          if (!editor) return;
          document.getElementById("btn-bold").style.background =
            editor.is_bold() ? "#c8e0ff" : "";
          document.getElementById("btn-italic").style.background =
            editor.is_italic() ? "#c8e0ff" : "";
          document.getElementById("btn-underline").style.background =
            editor.is_underline() ? "#c8e0ff" : "";
        }

        document.getElementById("btn-bold").addEventListener("click", () => {
          editor.toggle_bold();
          updateToolbarState();
          renderFrame();
          textarea.focus();
        });
        document.getElementById("btn-italic").addEventListener("click", () => {
          editor.toggle_italic();
          updateToolbarState();
          renderFrame();
          textarea.focus();
        });
        document.getElementById("btn-underline").addEventListener("click", () => {
          editor.toggle_underline();
          updateToolbarState();
          renderFrame();
          textarea.focus();
        });

        textarea.addEventListener("beforeinput", (e) => {
          if (e.isComposing) return;
          const data = e.data;
          if (e.inputType === "insertText" && data) {
            e.preventDefault();
            insertTextAtSelection(data);
            textarea.value = "";
            renderFrame();
          } else if (e.inputType === "deleteContentBackward") {
            e.preventDefault();
            handledByBeforeInput = true;
            if (!deleteSelectionIfNeeded() && cursorOffset > 0) {
              editor.delete_range(cursorOffset - 1, cursorOffset);
              cursorOffset -= 1;
              clearSelection();
            }
            textarea.value = "";
            renderFrame();
          } else if (e.inputType === "deleteContentForward") {
            e.preventDefault();
            handledByBeforeInput = true;
            const t = editor.plain_text();
            if (!deleteSelectionIfNeeded() && cursorOffset < t.length) {
              editor.delete_range(cursorOffset, cursorOffset + 1);
              clearSelection();
            }
            textarea.value = "";
            renderFrame();
          } else if (
            e.inputType === "insertLineBreak" ||
            e.inputType === "insertParagraph"
          ) {
            e.preventDefault();
            insertTextAtSelection("\n");
            textarea.value = "";
            renderFrame();
          }
        });

        // Track whether beforeinput already handled the event
        let handledByBeforeInput = false;

        textarea.addEventListener("keydown", (e) => {
          if (e.isComposing) return;
          handledByBeforeInput = false;
          const mod = e.ctrlKey || e.metaKey;
          const textLength = editor.plain_text().length;

          function startOrExtendSelection(newOffset) {
            if (e.shiftKey) {
              if (selectionAnchor === null) selectionAnchor = cursorOffset;
              cursorOffset = newOffset;
              selectionFocus = cursorOffset;
              editor.set_selection(selectionAnchor, selectionFocus);
            } else {
              cursorOffset = newOffset;
              clearSelection();
            }
          }

          // --- Select all ---
          if (mod && e.key === "a") {
            e.preventDefault();
            selectionAnchor = 0;
            selectionFocus = textLength;
            cursorOffset = textLength;
            editor.set_selection(0, textLength);
            renderFrame();
            return;
          }

          // --- Formatting shortcuts ---
          if (mod && e.key === "b") {
            e.preventDefault();
            editor.toggle_bold();
            updateToolbarState();
            renderFrame();
            return;
          }
          if (mod && e.key === "i") {
            e.preventDefault();
            editor.toggle_italic();
            updateToolbarState();
            renderFrame();
            return;
          }
          if (mod && e.key === "u") {
            e.preventDefault();
            editor.toggle_underline();
            updateToolbarState();
            renderFrame();
            return;
          }

          // --- Undo/Redo ---
          if (mod && e.key === "z") {
            e.preventDefault();
            if (e.shiftKey) {
              editor.redo();
            } else {
              editor.undo();
            }
            cursorOffset = editor.selection_end();
            clearSelection();
            renderFrame();
            return;
          }

          // --- Clipboard ---
          if (mod && e.key === "c") {
            const text = editor.get_selected_text();
            if (text) navigator.clipboard.writeText(text);
            return;
          }
          if (mod && e.key === "x") {
            e.preventDefault();
            const text = editor.get_selected_text();
            if (text) {
              navigator.clipboard.writeText(text);
              editor.clipboard_cut();
              cursorOffset = editor.selection_start();
              clearSelection();
              renderFrame();
            }
            return;
          }
          if (mod && e.key === "v") {
            e.preventDefault();
            navigator.clipboard.readText().then((text) => {
              if (text) {
                deleteSelectionIfNeeded();
                editor.insert_text_at(cursorOffset, text);
                cursorOffset += text.length;
                clearSelection();
                renderFrame();
              }
            });
            return;
          }

          // --- Backspace ---
          if (e.key === "Backspace") {
            e.preventDefault();
            setTimeout(() => {
              if (!handledByBeforeInput) {
                if (!deleteSelectionIfNeeded()) {
                  if (mod) {
                    const wb = editor.word_boundary_left(cursorOffset);
                    if (wb < cursorOffset) {
                      editor.delete_range(wb, cursorOffset);
                      cursorOffset = wb;
                      clearSelection();
                    }
                  } else if (cursorOffset > 0) {
                    editor.delete_range(cursorOffset - 1, cursorOffset);
                    cursorOffset -= 1;
                    clearSelection();
                  }
                }
                textarea.value = "";
                renderFrame();
              }
            }, 0);
            return;
          }

          // --- Delete ---
          if (e.key === "Delete") {
            e.preventDefault();
            setTimeout(() => {
              if (!handledByBeforeInput) {
                if (!deleteSelectionIfNeeded()) {
                  if (mod) {
                    const wb = editor.word_boundary_right(cursorOffset);
                    if (wb > cursorOffset) {
                      editor.delete_range(cursorOffset, wb);
                      clearSelection();
                    }
                  } else if (cursorOffset < textLength) {
                    editor.delete_range(cursorOffset, cursorOffset + 1);
                    clearSelection();
                  }
                }
                textarea.value = "";
                renderFrame();
              }
            }, 0);
            return;
          }

          // --- Enter ---
          if (e.key === "Enter") {
            e.preventDefault();
            insertTextAtSelection("\n");
            textarea.value = "";
            renderFrame();
            return;
          }

          // --- Tab ---
          if (e.key === "Tab") {
            e.preventDefault();
            insertTextAtSelection("\t");
            textarea.value = "";
            renderFrame();
            return;
          }

          // --- Home ---
          if (e.key === "Home") {
            e.preventDefault();
            if (mod) {
              startOrExtendSelection(0);
            } else {
              try {
                const lineStart = editor.line_start_for_offset(cursorOffset);
                startOrExtendSelection(lineStart);
              } catch {
                startOrExtendSelection(0);
              }
            }
            renderFrame();
            return;
          }

          // --- End ---
          if (e.key === "End") {
            e.preventDefault();
            if (mod) {
              startOrExtendSelection(textLength);
            } else {
              try {
                const lineEnd = editor.line_end_for_offset(cursorOffset);
                startOrExtendSelection(lineEnd);
              } catch {
                startOrExtendSelection(textLength);
              }
            }
            renderFrame();
            return;
          }

          // --- Arrow Up ---
          if (e.key === "ArrowUp") {
            e.preventDefault();
            try {
              const above = editor.offset_above(cursorOffset);
              startOrExtendSelection(above);
            } catch {
              startOrExtendSelection(0);
            }
            renderFrame();
            return;
          }

          // --- Arrow Down ---
          if (e.key === "ArrowDown") {
            e.preventDefault();
            try {
              const below = editor.offset_below(cursorOffset);
              startOrExtendSelection(below);
            } catch {
              startOrExtendSelection(textLength);
            }
            renderFrame();
            return;
          }

          // --- Page Up ---
          if (e.key === "PageUp") {
            e.preventDefault();
            // Move up ~20 lines by iterating offset_above.
            let pos = cursorOffset;
            for (let i = 0; i < 20; i++) {
              try {
                const above = editor.offset_above(pos);
                if (above === pos) break;
                pos = above;
              } catch { break; }
            }
            startOrExtendSelection(pos);
            renderFrame();
            return;
          }

          // --- Page Down ---
          if (e.key === "PageDown") {
            e.preventDefault();
            let pos = cursorOffset;
            for (let i = 0; i < 20; i++) {
              try {
                const below = editor.offset_below(pos);
                if (below === pos) break;
                pos = below;
              } catch { break; }
            }
            startOrExtendSelection(pos);
            renderFrame();
            return;
          }

          // --- Arrow Left ---
          if (e.key === "ArrowLeft") {
            e.preventDefault();
            if (mod) {
              const wb = editor.word_boundary_left(cursorOffset);
              startOrExtendSelection(wb);
            } else if (e.shiftKey) {
              startOrExtendSelection(Math.max(0, cursorOffset - 1));
            } else {
              if (hasSelection()) {
                cursorOffset = normalizedSelection().start;
              } else if (cursorOffset > 0) {
                cursorOffset -= 1;
              }
              clearSelection();
            }
            renderFrame();
            return;
          }

          // --- Arrow Right ---
          if (e.key === "ArrowRight") {
            e.preventDefault();
            if (mod) {
              const wb = editor.word_boundary_right(cursorOffset);
              startOrExtendSelection(wb);
            } else if (e.shiftKey) {
              startOrExtendSelection(Math.min(textLength, cursorOffset + 1));
            } else {
              if (hasSelection()) {
                cursorOffset = normalizedSelection().end;
              } else if (cursorOffset < textLength) {
                cursorOffset += 1;
              }
              clearSelection();
            }
            renderFrame();
            return;
          }
        });

        textarea.addEventListener("compositionend", (e) => {
          const committed = e.data || textarea.value;
          if (committed) {
            insertTextAtSelection(committed);
            renderFrame();
          }
          textarea.value = "";
        });

        // Update display
        setInterval(() => {
          if (editor) {
            const text = editor.plain_text();
            document.getElementById("char-count").textContent =
              `Characters: ${editor.char_count()}`;
            document.getElementById("text-output").textContent = text ||
              "(empty)";
          }
        }, 100);

        clearSelection();
        renderFrame();
        textarea.focus();
      }

      // Tab switching.
      document.getElementById("btn-canvas").addEventListener(
        "click",
        () => {
          document.getElementById("canvas-section").style.display = "";
          document.getElementById("ce-section").style.display = "none";
        },
      );
      document
        .getElementById("btn-contenteditable")
        .addEventListener("click", () => {
          document.getElementById("canvas-section").style.display =
            "none";
          document.getElementById("ce-section").style.display = "";
        });

      // contenteditable char count.
      const ceEditor = document.getElementById(
        "contenteditable-editor",
      );
      ceEditor.addEventListener("input", () => {
        document.getElementById("char-count").textContent =
          `Characters: ${ceEditor.textContent.length}`;
        document.getElementById("text-output").textContent =
          ceEditor.textContent || "(empty)";
      });

      // Expose editor globally for Playwright tests.
      window.__canvistSetup = setup();
      window.__canvistEditor = null;
      window.__canvistSetup.then(() => {
        window.__canvistEditor = editor;
      });
    </script>
  </body>
</html>
