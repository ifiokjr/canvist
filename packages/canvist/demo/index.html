<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>canvist editor demo</title>
    <!-- Load Inter for consistent cross-platform font rendering.
         Uses media="print" + onload trick to avoid render-blocking. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        background: #f5f5f5;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
        min-height: 100vh;
      }

      h1 {
        margin-bottom: 1rem;
        color: #333;
      }

      .editor-container {
        position: relative;
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }

      #editor-canvas {
        display: block;
        cursor: text;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        font-smooth: always;
      }

      #contenteditable-editor {
        width: 800px;
        min-height: 400px;
        padding: 20px;
        font-family: sans-serif;
        font-size: 16px;
        line-height: 1.5;
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        outline: none;
        white-space: pre-wrap;
      }

      .controls {
        margin: 1rem 0;
        display: flex;
        gap: 1rem;
      }

      button {
        padding: 0.5rem 1rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: white;
        cursor: pointer;
      }

      button:hover {
        background: #eee;
      }

      #text-output {
        margin-top: 1rem;
        padding: 1rem;
        background: #f0f0f0;
        border-radius: 4px;
        font-family: monospace;
        white-space: pre-wrap;
        max-width: 800px;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <h1>canvist editor</h1>

    <div class="controls">
      <button id="btn-canvas" class="active">Canvas Editor</button>
      <button id="btn-contenteditable">contenteditable (comparison)</button>
    </div>

    <div id="canvas-section">
      <div id="formatting-toolbar" style="margin-bottom:8px;display:flex;gap:4px;">
        <button id="btn-bold" title="Bold (Ctrl+B)" style="font-weight:bold;width:32px;">B</button>
        <button id="btn-italic" title="Italic (Ctrl+I)" style="font-style:italic;width:32px;">I</button>
        <button id="btn-underline" title="Underline (Ctrl+U)" style="text-decoration:underline;width:32px;">U</button>
        <button id="btn-strikethrough" title="Strikethrough (Ctrl+Shift+S)" style="text-decoration:line-through;width:32px;">S</button>
        <span style="border-left:1px solid #ccc;margin:0 4px;"></span>
        <select id="font-size-select" title="Font Size" style="padding:4px;">
          <option value="12">12px</option>
          <option value="14">14px</option>
          <option value="16" selected>16px</option>
          <option value="20">20px</option>
          <option value="24">24px</option>
          <option value="32">32px</option>
          <option value="48">48px</option>
        </select>
        <span style="border-left:1px solid #ccc;margin:0 4px;"></span>
        <button id="btn-align-left" title="Align Left" style="width:32px;font-weight:bold;">⇤</button>
        <button id="btn-align-center" title="Align Center" style="width:32px;font-weight:bold;">⇔</button>
        <button id="btn-align-right" title="Align Right" style="width:32px;font-weight:bold;">⇥</button>
      </div>
      <!-- Find/Replace bar (hidden by default) -->
      <div id="find-bar" style="display:none;margin-bottom:8px;padding:8px;background:#f0f0f0;border:1px solid #ddd;border-radius:4px;gap:4px;align-items:center;">
        <input id="find-input" type="text" placeholder="Find…" style="padding:4px 8px;border:1px solid #ccc;border-radius:3px;width:200px;" />
        <button id="find-prev-btn" title="Previous (Shift+Enter)">▲</button>
        <button id="find-next-btn" title="Next (Enter)">▼</button>
        <span id="find-count" style="font-size:0.85em;color:#666;min-width:60px;"></span>
        <span style="border-left:1px solid #ccc;margin:0 4px;height:20px;"></span>
        <input id="replace-input" type="text" placeholder="Replace…" style="padding:4px 8px;border:1px solid #ccc;border-radius:3px;width:200px;" />
        <button id="replace-btn" title="Replace">Replace</button>
        <button id="replace-all-btn" title="Replace All">All</button>
        <label style="font-size:0.85em;margin-left:8px;"><input id="find-case" type="checkbox" /> Match case</label>
        <button id="find-close-btn" title="Close (Escape)" style="margin-left:auto;">✕</button>
      </div>
      <div class="editor-container">
        <canvas id="editor-canvas" width="800" height="400"></canvas>
      </div>
    </div>

    <div id="ce-section" style="display: none">
      <div
        id="contenteditable-editor"
        contenteditable="true"
        data-placeholder="Type here..."
      >
      </div>
    </div>

    <div id="status-bar" style="width:800px;max-width:calc(100vw - 4rem);display:flex;gap:1.5rem;padding:6px 12px;background:#f5f5f5;border:1px solid #ddd;border-top:none;border-radius:0 0 8px 8px;font-size:0.82rem;color:#666;font-family:'Inter',system-ui,sans-serif;">
      <span id="status-position">Ln 1, Col 1</span>
      <span id="status-words">0 words</span>
      <span id="status-chars">0 chars</span>
      <span id="status-lines">1 line</span>
    </div>
    <pre id="text-output" style="margin-top:1rem;padding:1rem;background:#f0f0f0;border-radius:4px;font-family:monospace;white-space:pre-wrap;max-width:800px;word-break:break-all;"></pre>

    <script type="module">
      import init, { CanvistEditor } from "../wasm/canvist_wasm.js";

      let editor = null;
      let cursorOffset = 0;
      let selectionAnchor = null;
      let selectionFocus = null;
      let isDraggingSelection = false;
      let didDragSelection = false;

      async function setup() {
        await init();

        // --- HiDPI / Retina canvas scaling ---
        const canvas = document.getElementById("editor-canvas");
        const dpr = window.devicePixelRatio || 1;
        let cssWidth = 800;
        let cssHeight = 400;
        canvas.style.width = cssWidth + "px";
        canvas.style.height = cssHeight + "px";
        canvas.width = Math.round(cssWidth * dpr);
        canvas.height = Math.round(cssHeight * dpr);
        const ctx2d = canvas.getContext("2d");
        if (ctx2d && dpr !== 1) {
          ctx2d.scale(dpr, dpr);
        }

        // --- Font pre-loading ---
        // Wait for fonts to load (up to 2s) before first render for smooth text.
        // In offline/headless environments this may time out — that's fine,
        // the system-ui fallback still renders cleanly.
        try {
          await Promise.race([
            document.fonts.ready,
            new Promise((r) => setTimeout(r, 2000)),
          ]);
        } catch {}

        editor = CanvistEditor.create("editor-canvas");
        // Tell WASM to use CSS (logical) dimensions for layout, not DPR-scaled pixels.
        editor.set_size(cssWidth, cssHeight);
        editor.render();

        // --- Caret blink timer ---
        let caretVisible = true;
        setInterval(() => {
          caretVisible = !caretVisible;
          editor.set_caret_visible(caretVisible);
          try {
            editor.render();
          } catch {}
        }, 530);

        // --- Hidden textarea for keyboard capture ---
        // (canvas was declared above in the HiDPI section)
        const textarea = document.createElement("textarea");
        textarea.id = "canvist-input";
        textarea.setAttribute("autocomplete", "off");
        textarea.setAttribute("autocorrect", "off");
        textarea.setAttribute("autocapitalize", "off");
        textarea.setAttribute("spellcheck", "false");
        textarea.setAttribute("aria-label", "Document editor input");
        textarea.style.cssText =
          "position:absolute;left:0;top:0;width:1px;height:1px;opacity:0.01;pointer-events:none;";
        canvas.parentElement.appendChild(textarea);

        canvas.addEventListener("click", () => textarea.focus());
        canvas.addEventListener("focus", () => textarea.focus());
        canvas.setAttribute("tabindex", "0");
        canvas.setAttribute("role", "textbox");
        canvas.setAttribute("aria-multiline", "true");
        canvas.setAttribute("aria-label", "Canvist document editor");
        canvas.setAttribute("aria-controls", "canvist-input");

        function hasSelection() {
          return (
            selectionAnchor !== null &&
            selectionFocus !== null &&
            selectionAnchor !== selectionFocus
          );
        }

        function normalizedSelection() {
          if (!hasSelection()) {
            return null;
          }
          const start = Math.min(selectionAnchor, selectionFocus);
          const end = Math.max(selectionAnchor, selectionFocus);
          return { start, end };
        }

        function clearSelection() {
          selectionAnchor = cursorOffset;
          selectionFocus = cursorOffset;
          editor.set_selection(cursorOffset, cursorOffset);
        }

        function setSelection(anchor, focus) {
          selectionAnchor = anchor;
          selectionFocus = focus;
          cursorOffset = focus;
          editor.set_selection(anchor, focus);
        }

        function deleteSelectionIfNeeded() {
          const selection = normalizedSelection();
          if (!selection) {
            return false;
          }
          editor.delete_range(selection.start, selection.end);
          cursorOffset = selection.start;
          clearSelection();
          return true;
        }

        function insertTextAtSelection(text) {
          deleteSelectionIfNeeded();
          editor.insert_text_at(cursorOffset, text);
          cursorOffset += text.length;
          clearSelection();
        }

        function charOffsetFromMouse(e) {
          const rect = canvas.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          try {
            return editor.hit_test(x, y);
          } catch {
            return cursorOffset;
          }
        }

        function syncA11yState() {
          const text = editor.plain_text();
          const selection = normalizedSelection();
          textarea.value = text;
          if (selection) {
            textarea.setSelectionRange(selection.start, selection.end);
          } else {
            textarea.setSelectionRange(cursorOffset, cursorOffset);
          }
          canvas.setAttribute("aria-valuetext", text);
        }

        let autoScroll = true; // set to false when scrolling by mouse wheel

        function renderFrame() {
          try {
            caretVisible = true;
            editor.set_caret_visible(true);
            editor.set_now_ms(Date.now());
            if (autoScroll) scrollToCaret();
            autoScroll = true;
            editor.render();
            syncA11yState();
            updateStatusBar();
          } catch (e) {
            console.error("render error:", e);
          }
        }

        // --- Scroll-into-view ---
        function scrollToCaret() {
          try {
            const caretInfo = editor.caret_y(); // [y, height]
            const caretTop = caretInfo[0];
            const caretBottom = caretTop + caretInfo[1];
            const viewTop = editor.scroll_y();
            const viewBottom = viewTop + cssHeight;
            const margin = 24; // keep some breathing room
            if (caretTop < viewTop + margin) {
              editor.set_scroll_y(Math.max(0, caretTop - margin));
            } else if (caretBottom > viewBottom - margin) {
              editor.set_scroll_y(caretBottom - cssHeight + margin);
            }
          } catch {}
        }

        // --- Mouse wheel scrolling ---
        canvas.addEventListener("wheel", (e) => {
          e.preventDefault();
          editor.scroll_by(e.deltaY);
          autoScroll = false; // don't snap back to caret on wheel scroll
          renderFrame();
        }, { passive: false });

        // --- Focus / blur ---
        textarea.addEventListener("focus", () => {
          editor.set_focused(true);
          canvas.parentElement.style.borderColor = "#4285f4";
          canvas.parentElement.style.boxShadow = "0 0 0 2px rgba(66,133,244,0.25), 0 2px 8px rgba(0,0,0,0.1)";
          renderFrame();
        });
        textarea.addEventListener("blur", () => {
          editor.set_focused(false);
          canvas.parentElement.style.borderColor = "#ddd";
          canvas.parentElement.style.boxShadow = "0 2px 8px rgba(0,0,0,0.1)";
          renderFrame();
        });

        // --- Status bar ---
        function updateStatusBar() {
          try {
            const ln = editor.cursor_line();
            const col = editor.cursor_column();
            const words = editor.word_count();
            const chars = editor.char_count();
            const lines = editor.line_count();
            document.getElementById("status-position").textContent = `Ln ${ln}, Col ${col}`;
            document.getElementById("status-words").textContent = `${words} word${words !== 1 ? "s" : ""}`;
            document.getElementById("status-chars").textContent = `${chars} char${chars !== 1 ? "s" : ""}`;
            document.getElementById("status-lines").textContent = `${lines} line${lines !== 1 ? "s" : ""}`;
          } catch {}
        }

        // --- Alignment toolbar ---
        document.getElementById("btn-align-left").addEventListener("click", () => {
          // TODO: wire up set_text_align when paragraph-level alignment is implemented
          textarea.focus();
        });
        document.getElementById("btn-align-center").addEventListener("click", () => {
          textarea.focus();
        });
        document.getElementById("btn-align-right").addEventListener("click", () => {
          textarea.focus();
        });

        // --- Responsive resize ---
        if (typeof ResizeObserver !== "undefined") {
          const resizeObs = new ResizeObserver((entries) => {
            for (const entry of entries) {
              const rect = entry.contentRect;
              const w = Math.round(rect.width);
              const h = Math.round(rect.height || cssHeight);
              if (w > 0 && h > 0 && (w !== cssWidth || h !== cssHeight)) {
                cssWidth = w;
                cssHeight = h;
                canvas.style.width = w + "px";
                canvas.style.height = h + "px";
                const newDpr = window.devicePixelRatio || 1;
                canvas.width = Math.round(w * newDpr);
                canvas.height = Math.round(h * newDpr);
                const newCtx = canvas.getContext("2d");
                if (newCtx && newDpr !== 1) {
                  newCtx.scale(newDpr, newDpr);
                }
                editor.set_size(w, h);
                renderFrame();
              }
            }
          });
          resizeObs.observe(canvas.parentElement);
        }

        let clickCount = 0;
        let lastClickTime = 0;

        canvas.addEventListener("mousedown", (e) => {
          const now = Date.now();
          clickCount = now - lastClickTime < 400 ? clickCount + 1 : 1;
          lastClickTime = now;

          const offset = charOffsetFromMouse(e);
          textarea.focus();

          if (clickCount === 3) {
            // Triple-click: select entire line/paragraph.
            const text = editor.plain_text();
            let start = offset;
            while (start > 0 && text[start - 1] !== "\n") start--;
            let end = offset;
            while (end < text.length && text[end] !== "\n") end++;
            setSelection(start, end);
            clickCount = 0;
          } else if (clickCount === 2) {
            // Double-click: select word.
            editor.select_word_at(offset);
            selectionAnchor = editor.selection_start();
            selectionFocus = editor.selection_end();
            cursorOffset = selectionFocus;
          } else {
            isDraggingSelection = true;
            didDragSelection = false;
            setSelection(offset, offset);
          }

          renderFrame();
          e.preventDefault();
        });

        canvas.addEventListener("mousemove", (e) => {
          if (!isDraggingSelection) return;
          const offset = charOffsetFromMouse(e);
          if (offset !== cursorOffset) {
            didDragSelection = true;
          }
          setSelection(selectionAnchor, offset);
          renderFrame();
        });

        window.addEventListener("mouseup", (e) => {
          if (!isDraggingSelection) return;
          isDraggingSelection = false;
          const offset = charOffsetFromMouse(e);
          setSelection(selectionAnchor, offset);
          renderFrame();
        });

        canvas.addEventListener("click", (e) => {
          textarea.focus();
          if (didDragSelection) {
            didDragSelection = false;
            return;
          }
          const offset = charOffsetFromMouse(e);
          cursorOffset = offset;
          clearSelection();
          renderFrame();
        });

        // --- Formatting toolbar ---
        function updateToolbarState() {
          if (!editor) return;
          document.getElementById("btn-bold").style.background =
            editor.is_bold() ? "#c8e0ff" : "";
          document.getElementById("btn-italic").style.background =
            editor.is_italic() ? "#c8e0ff" : "";
          document.getElementById("btn-underline").style.background =
            editor.is_underline() ? "#c8e0ff" : "";
        }

        document.getElementById("btn-bold").addEventListener("click", () => {
          editor.toggle_bold();
          updateToolbarState();
          renderFrame();
          textarea.focus();
        });
        document.getElementById("btn-italic").addEventListener("click", () => {
          editor.toggle_italic();
          updateToolbarState();
          renderFrame();
          textarea.focus();
        });
        document.getElementById("btn-underline").addEventListener("click", () => {
          editor.toggle_underline();
          updateToolbarState();
          renderFrame();
          textarea.focus();
        });
        document.getElementById("btn-strikethrough").addEventListener("click", () => {
          editor.toggle_strikethrough();
          renderFrame();
          textarea.focus();
        });
        document.getElementById("font-size-select").addEventListener("change", (e) => {
          const size = parseFloat(e.target.value);
          if (size && hasSelection()) {
            editor.set_font_size(size);
            renderFrame();
          }
          textarea.focus();
        });

        // --- Find / Replace ---
        const findBar = document.getElementById("find-bar");
        const findInput = document.getElementById("find-input");
        const replaceInput = document.getElementById("replace-input");
        const findCountSpan = document.getElementById("find-count");
        const findCaseCheckbox = document.getElementById("find-case");
        let findOpen = false;

        function openFind() {
          findOpen = true;
          findBar.style.display = "flex";
          findInput.focus();
          updateFindHighlight();
        }
        function closeFind() {
          findOpen = false;
          findBar.style.display = "none";
          textarea.focus();
          renderFrame();
        }
        function caseSensitive() {
          return findCaseCheckbox.checked;
        }
        function updateFindHighlight() {
          const needle = findInput.value;
          if (!needle) {
            findCountSpan.textContent = "";
            return;
          }
          const matches = editor.find_all(needle, caseSensitive());
          const count = matches.length / 2;
          findCountSpan.textContent = count > 0 ? `${count} match${count > 1 ? "es" : ""}` : "No matches";
        }
        function findNext() {
          const needle = findInput.value;
          if (!needle) return;
          const result = editor.find_next(needle, cursorOffset + 1, caseSensitive());
          if (result.length === 2) {
            setSelection(result[0], result[1]);
            cursorOffset = result[1];
            renderFrame();
          }
          updateFindHighlight();
        }
        function findPrev() {
          const needle = findInput.value;
          if (!needle) return;
          const result = editor.find_prev(needle, cursorOffset, caseSensitive());
          if (result.length === 2) {
            setSelection(result[0], result[1]);
            cursorOffset = result[1];
            renderFrame();
          }
          updateFindHighlight();
        }
        function replaceOne() {
          const sel = normalizedSelection();
          if (!sel) return;
          const replacement = replaceInput.value;
          editor.replace_range(sel.start, sel.end, replacement);
          cursorOffset = sel.start + replacement.length;
          clearSelection();
          renderFrame();
          findNext();
        }
        function replaceAll() {
          const needle = findInput.value;
          const replacement = replaceInput.value;
          if (!needle) return;
          const count = editor.replace_all(needle, replacement, caseSensitive());
          clearSelection();
          renderFrame();
          updateFindHighlight();
          findCountSpan.textContent = `Replaced ${count}`;
        }

        document.getElementById("find-next-btn").addEventListener("click", findNext);
        document.getElementById("find-prev-btn").addEventListener("click", findPrev);
        document.getElementById("replace-btn").addEventListener("click", replaceOne);
        document.getElementById("replace-all-btn").addEventListener("click", replaceAll);
        document.getElementById("find-close-btn").addEventListener("click", closeFind);
        findInput.addEventListener("input", updateFindHighlight);
        findCaseCheckbox.addEventListener("change", updateFindHighlight);
        findInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            e.shiftKey ? findPrev() : findNext();
          }
          if (e.key === "Escape") closeFind();
        });
        replaceInput.addEventListener("keydown", (e) => {
          if (e.key === "Escape") closeFind();
        });

        textarea.addEventListener("beforeinput", (e) => {
          if (e.isComposing) return;
          const data = e.data;
          if (e.inputType === "insertText" && data) {
            e.preventDefault();
            insertTextAtSelection(data);
            textarea.value = "";
            renderFrame();
          } else if (e.inputType === "deleteContentBackward") {
            e.preventDefault();
            handledByBeforeInput = true;
            if (!deleteSelectionIfNeeded() && cursorOffset > 0) {
              editor.delete_range(cursorOffset - 1, cursorOffset);
              cursorOffset -= 1;
              clearSelection();
            }
            textarea.value = "";
            renderFrame();
          } else if (e.inputType === "deleteContentForward") {
            e.preventDefault();
            handledByBeforeInput = true;
            const t = editor.plain_text();
            if (!deleteSelectionIfNeeded() && cursorOffset < t.length) {
              editor.delete_range(cursorOffset, cursorOffset + 1);
              clearSelection();
            }
            textarea.value = "";
            renderFrame();
          } else if (
            e.inputType === "insertLineBreak" ||
            e.inputType === "insertParagraph"
          ) {
            e.preventDefault();
            insertTextAtSelection("\n");
            textarea.value = "";
            renderFrame();
          }
        });

        // Track whether beforeinput already handled the event
        let handledByBeforeInput = false;

        textarea.addEventListener("keydown", (e) => {
          if (e.isComposing) return;
          handledByBeforeInput = false;
          const mod = e.ctrlKey || e.metaKey;
          const textLength = editor.plain_text().length;

          function startOrExtendSelection(newOffset) {
            if (e.shiftKey) {
              if (selectionAnchor === null) selectionAnchor = cursorOffset;
              cursorOffset = newOffset;
              selectionFocus = cursorOffset;
              editor.set_selection(selectionAnchor, selectionFocus);
            } else {
              cursorOffset = newOffset;
              clearSelection();
            }
          }

          // --- Find (Ctrl+F) ---
          if (mod && e.key === "f") {
            e.preventDefault();
            openFind();
            return;
          }

          // --- Strikethrough (Ctrl+Shift+S) ---
          if (mod && e.shiftKey && e.key === "S") {
            e.preventDefault();
            editor.toggle_strikethrough();
            renderFrame();
            return;
          }

          // --- Select all ---
          if (mod && e.key === "a") {
            e.preventDefault();
            selectionAnchor = 0;
            selectionFocus = textLength;
            cursorOffset = textLength;
            editor.set_selection(0, textLength);
            renderFrame();
            return;
          }

          // --- Formatting shortcuts ---
          if (mod && e.key === "b") {
            e.preventDefault();
            editor.toggle_bold();
            updateToolbarState();
            renderFrame();
            return;
          }
          if (mod && e.key === "i") {
            e.preventDefault();
            editor.toggle_italic();
            updateToolbarState();
            renderFrame();
            return;
          }
          if (mod && e.key === "u") {
            e.preventDefault();
            editor.toggle_underline();
            updateToolbarState();
            renderFrame();
            return;
          }

          // --- Undo/Redo ---
          if (mod && e.key === "z") {
            e.preventDefault();
            if (e.shiftKey) {
              editor.redo();
            } else {
              editor.undo();
            }
            cursorOffset = editor.selection_end();
            clearSelection();
            renderFrame();
            return;
          }

          // --- Clipboard ---
          if (mod && e.key === "c") {
            const text = editor.get_selected_text();
            if (text) navigator.clipboard.writeText(text);
            return;
          }
          if (mod && e.key === "x") {
            e.preventDefault();
            const text = editor.get_selected_text();
            if (text) {
              navigator.clipboard.writeText(text);
              editor.clipboard_cut();
              cursorOffset = editor.selection_start();
              clearSelection();
              renderFrame();
            }
            return;
          }
          if (mod && e.key === "v") {
            e.preventDefault();
            navigator.clipboard.readText().then((text) => {
              if (text) {
                deleteSelectionIfNeeded();
                editor.insert_text_at(cursorOffset, text);
                cursorOffset += text.length;
                clearSelection();
                renderFrame();
              }
            });
            return;
          }

          // --- Backspace ---
          if (e.key === "Backspace") {
            e.preventDefault();
            setTimeout(() => {
              if (!handledByBeforeInput) {
                if (!deleteSelectionIfNeeded()) {
                  if (mod) {
                    const wb = editor.word_boundary_left(cursorOffset);
                    if (wb < cursorOffset) {
                      editor.delete_range(wb, cursorOffset);
                      cursorOffset = wb;
                      clearSelection();
                    }
                  } else if (cursorOffset > 0) {
                    editor.delete_range(cursorOffset - 1, cursorOffset);
                    cursorOffset -= 1;
                    clearSelection();
                  }
                }
                textarea.value = "";
                renderFrame();
              }
            }, 0);
            return;
          }

          // --- Delete ---
          if (e.key === "Delete") {
            e.preventDefault();
            setTimeout(() => {
              if (!handledByBeforeInput) {
                if (!deleteSelectionIfNeeded()) {
                  if (mod) {
                    const wb = editor.word_boundary_right(cursorOffset);
                    if (wb > cursorOffset) {
                      editor.delete_range(cursorOffset, wb);
                      clearSelection();
                    }
                  } else if (cursorOffset < textLength) {
                    editor.delete_range(cursorOffset, cursorOffset + 1);
                    clearSelection();
                  }
                }
                textarea.value = "";
                renderFrame();
              }
            }, 0);
            return;
          }

          // --- Enter ---
          if (e.key === "Enter") {
            e.preventDefault();
            insertTextAtSelection("\n");
            textarea.value = "";
            renderFrame();
            return;
          }

          // --- Tab ---
          if (e.key === "Tab") {
            e.preventDefault();
            insertTextAtSelection("\t");
            textarea.value = "";
            renderFrame();
            return;
          }

          // --- Home ---
          if (e.key === "Home") {
            e.preventDefault();
            if (mod) {
              startOrExtendSelection(0);
            } else {
              try {
                const lineStart = editor.line_start_for_offset(cursorOffset);
                startOrExtendSelection(lineStart);
              } catch {
                startOrExtendSelection(0);
              }
            }
            renderFrame();
            return;
          }

          // --- End ---
          if (e.key === "End") {
            e.preventDefault();
            if (mod) {
              startOrExtendSelection(textLength);
            } else {
              try {
                const lineEnd = editor.line_end_for_offset(cursorOffset);
                startOrExtendSelection(lineEnd);
              } catch {
                startOrExtendSelection(textLength);
              }
            }
            renderFrame();
            return;
          }

          // --- Arrow Up ---
          if (e.key === "ArrowUp") {
            e.preventDefault();
            try {
              const above = editor.offset_above(cursorOffset);
              startOrExtendSelection(above);
            } catch {
              startOrExtendSelection(0);
            }
            renderFrame();
            return;
          }

          // --- Arrow Down ---
          if (e.key === "ArrowDown") {
            e.preventDefault();
            try {
              const below = editor.offset_below(cursorOffset);
              startOrExtendSelection(below);
            } catch {
              startOrExtendSelection(textLength);
            }
            renderFrame();
            return;
          }

          // --- Page Up ---
          if (e.key === "PageUp") {
            e.preventDefault();
            // Move up ~20 lines by iterating offset_above.
            let pos = cursorOffset;
            for (let i = 0; i < 20; i++) {
              try {
                const above = editor.offset_above(pos);
                if (above === pos) break;
                pos = above;
              } catch { break; }
            }
            startOrExtendSelection(pos);
            renderFrame();
            return;
          }

          // --- Page Down ---
          if (e.key === "PageDown") {
            e.preventDefault();
            let pos = cursorOffset;
            for (let i = 0; i < 20; i++) {
              try {
                const below = editor.offset_below(pos);
                if (below === pos) break;
                pos = below;
              } catch { break; }
            }
            startOrExtendSelection(pos);
            renderFrame();
            return;
          }

          // --- Arrow Left ---
          if (e.key === "ArrowLeft") {
            e.preventDefault();
            if (mod) {
              const wb = editor.word_boundary_left(cursorOffset);
              startOrExtendSelection(wb);
            } else if (e.shiftKey) {
              startOrExtendSelection(Math.max(0, cursorOffset - 1));
            } else {
              if (hasSelection()) {
                cursorOffset = normalizedSelection().start;
              } else if (cursorOffset > 0) {
                cursorOffset -= 1;
              }
              clearSelection();
            }
            renderFrame();
            return;
          }

          // --- Arrow Right ---
          if (e.key === "ArrowRight") {
            e.preventDefault();
            if (mod) {
              const wb = editor.word_boundary_right(cursorOffset);
              startOrExtendSelection(wb);
            } else if (e.shiftKey) {
              startOrExtendSelection(Math.min(textLength, cursorOffset + 1));
            } else {
              if (hasSelection()) {
                cursorOffset = normalizedSelection().end;
              } else if (cursorOffset < textLength) {
                cursorOffset += 1;
              }
              clearSelection();
            }
            renderFrame();
            return;
          }
        });

        textarea.addEventListener("compositionend", (e) => {
          const committed = e.data || textarea.value;
          if (committed) {
            insertTextAtSelection(committed);
            renderFrame();
          }
          textarea.value = "";
        });

        // Update text preview
        setInterval(() => {
          if (editor) {
            const text = editor.plain_text();
            document.getElementById("text-output").textContent = text ||
              "(empty)";
          }
        }, 200);

        clearSelection();
        renderFrame();
        textarea.focus();
      }

      // Tab switching.
      document.getElementById("btn-canvas").addEventListener(
        "click",
        () => {
          document.getElementById("canvas-section").style.display = "";
          document.getElementById("ce-section").style.display = "none";
        },
      );
      document
        .getElementById("btn-contenteditable")
        .addEventListener("click", () => {
          document.getElementById("canvas-section").style.display =
            "none";
          document.getElementById("ce-section").style.display = "";
        });

      // contenteditable char count.
      const ceEditor = document.getElementById(
        "contenteditable-editor",
      );
      ceEditor.addEventListener("input", () => {
        document.getElementById("text-output").textContent =
          ceEditor.textContent || "(empty)";
      });

      // Expose editor globally for Playwright tests.
      window.__canvistSetup = setup();
      window.__canvistEditor = null;
      window.__canvistSetup.then(() => {
        window.__canvistEditor = editor;
      });
    </script>
  </body>
</html>
